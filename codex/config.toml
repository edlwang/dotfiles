# Codex CLI config -> symlinked to ~/.codex/config.toml by init.sh.
# Mirrors the intent of claude/settings.json where Codex has an equivalent.

# Default model settings, high verbosity to have it explain more
model = "gpt-5.6-sol"
model_reasoning_effort = "high"
model_verbosity = "high"

# If you want Codex to ask before edits/writes, the supported setup is a
# read-only sandbox with on-request approvals. `workspace-write` will not
# prompt for every write.
approval_policy = "on-request"
sandbox_mode = "read-only"

commit_attribution = "Codex <noreply@openai.com>"

[features]
memories = true
codex_git_commit = true

[tui.keymap.composer]
queue = []
