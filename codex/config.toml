# Codex CLI config -> symlinked to ~/.codex/config.toml by init.sh.
# Mirrors the intent of claude/settings.json where Codex has an equivalent.

# Medium reasoning by default.
# It applies when the selected model supports configurable reasoning effort.
model_reasoning_effort = "medium"
model_verbosity = "medium"

# Codex uses OpenAI model ids (not `opus`).
model = "gpt-5.6-sol"

# Codex has no config.toml command-deny setting. Push blocking is layered:
# sandbox_mode below blocks in-sandbox pushes (network write), rules/no-push.rules
# forbids `git push` escalated outside the sandbox, and AGENTS.md keeps the "Never
# push" instruction. For hard enforcement against the user too, add a git hook.

# If you want Codex to ask before edits/writes, the supported setup is a
# read-only sandbox with on-request approvals. `workspace-write` will not
# prompt for every write.
approval_policy = "on-request"
sandbox_mode = "read-only"
