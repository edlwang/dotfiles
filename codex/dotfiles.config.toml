# Codex CLI profile -> symlinked to ~/.codex/dotfiles.config.toml by init.sh.
# Codex loads it by default through the shell launchers in bash_aliases.

# Default model settings, high verbosity to have it explain more
model = "gpt-5.6-sol"
model_reasoning_effort = "high"
model_verbosity = "high"

# If you want Codex to ask before edits/writes, the supported setup is a
# read-only sandbox with on-request approvals. `workspace-write` will not
# prompt for every write.
approval_policy = "on-request"
sandbox_mode = "read-only"

commit_attribution = "Codex <noreply@openai.com>"

[features]
memories = true
codex_git_commit = true

[tui]
status_line = ["model-with-reasoning", "current-dir", "reasoning", "project-name", "git-branch", "run-state", "permissions", "approval-mode", "context-remaining", "context-used", "five-hour-limit", "weekly-limit", "task-progress"]
status_line_use_colors = true

[tui.keymap.composer]
queue = []
