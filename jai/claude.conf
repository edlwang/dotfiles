# ~/.jai/claude.conf
conf .defaults
jail claude
dir! .claude
dir! .local/state/claude
dir dotfiles
# Live ~/.config, including the wezterm/ and nvim/ dirs that symlink into
# dotfiles/. Granted read-only so runtime ~/.config/* paths resolve in-jail
# (e.g. bashrc sources wezterm/shell-integration.sh from there); edits to the
# dotfiles-managed config still go through dir dotfiles above.
rdir? .config
setenv PATH=${HOME}/.local/bin:${PATH}
